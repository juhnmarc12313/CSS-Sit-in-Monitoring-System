<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>CCS Sit-in Monitoring System</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav">
      <div class="logo">
        <img
          src="/image/ccslogo1.png"
          class="img"
          alt="uclogo"
          height="60px"
          width="60px"
        />
        <p class="title">CCS Sit-in Monitoring System</p>
      </div>

      <div class="nav-links" id="nav-links">
        <a href="/index.html" class="nav-link">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="/pages/community.html" class="nav-link">
          <i class="fas fa-users"></i> Community
        </a>
        <a href="/pages/aboutus.html" class="nav-link">
          <i class="fas fa-info-circle"></i> About
        </a>
        <a href="/pages/login.html" class="nav-link" id="loginLink">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="/pages/Register.html" class="nav-link" id="registerLink">

        </a>

            width="auto"
