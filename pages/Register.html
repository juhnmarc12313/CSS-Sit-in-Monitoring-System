<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/pages/Register.css" />
    <link rel="stylesheet" href="/public/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>CCS Sit-in Monitoring System - Register</title>
  </head>
  <body>
    <!-- Navigation -->
    <div class="nav">
      <div class="logo">
        <img
          src="/image/ccslogo1.png"
          class="img"
          alt="uclogo"
          height="50px"
          width="50px"
        />
        <p class="title">CCS Sit-in Monitoring</p>
      </div>

      <div class="links" id="nav-links">
        <a href="/index.html" class="nav-link">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="/pages/community.html" class="nav-link">
          <i class="fas fa-users"></i> Community
        </a>
        <a href="/pages/aboutus.html" class="nav-link">
          <i class="fas fa-info-circle"></i> About
        </a>
        <a href="/pages/login.html" class="nav-link" id="loginLink">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="/pages/Register.html" class="nav-link active" id="registerLink">
          <i class="fas fa-user-plus"></i> Register
        </a>
        <a href="/pages/dashboard.html" class="nav-link" id="dashboardLink" style="display: none;">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>
        <a href="#" class="nav-link" id="logoutLink" onclick="handleLogout()" style="display: none;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>

      <div class="nav-right" id="nav-right" style="display: none;">
        <div class="user-menu">
          <span class="welcome-user">Welcome, <span id="userName">Student</span></span>
        </div>
        <button class="logout-btn" onclick="handleLogout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <main>
      <section class="Register animate__animated animate__fadeInUp">
        <!-- Left Card - Personal & Academic Info -->
        <div class="container-left">
          <h1>Personal Information</h1>
          <form id="registerForm">
            <div class="section-title">Account Details</div>
            
            <div class="input-text">
              <input type="text" id="id_number" name="id_number" placeholder=" " required />
              <label for="id_number">ID Number</label>
            </div>

            <div class="input-text">
              <input type="text" id="last_name" name="last_name" placeholder=" " required />
              <label for="last_name">Last Name</label>
            </div>

            <div class="input-text">
              <input type="text" id="first_name" name="first_name" placeholder=" " required />
              <label for="first_name">First Name</label>
            </div>

            <div class="input-text">
              <input type="text" id="middle_name" name="middle_name" placeholder=" " />
              <label for="middle_name">Middle Name</label>
            </div>

            <div class="section-title">Academic Info</div>

            <div class="input-text">
              <select id="course_level" name="course_level" required>
                <option value="" disabled selected></option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
              <label for="course_level" class="select-label">Year Level</label>
            </div>
          </form>
        </div>

        <!-- Right Card - Course, Contact & Password -->
        <div class="container-right">
          <h1>Account Setup</h1>
          <form id="registerFormRight">
            <div class="section-title">Course & Contact</div>

            <div class="input-text">
              <select id="course" name="course" required>
                <option value="" disabled selected></option>
                <option value="BSIT">BS in Information Technology</option>
                <option value="BSCS">BS in Computer Science</option>
                <option value="BSIS">BS in Information Systems</option>
                <option value="ACT">BS in Artificial Intelligence (AI)</option>
              </select>
              <label for="course" class="select-label">Course</label>
            </div>

            <div class="input-text">
              <input type="text" id="address" name="address" placeholder=" " />
              <label for="address">Address</label>
            </div>

            <div class="input-text">
              <input type="email" id="email" name="email" placeholder=" " required />
              <label for="email">Email</label>
            </div>

            <div class="section-title">Security</div>

            <div class="input-text">
              <input type="password" id="password" name="password" placeholder=" " required minlength="6" />
              <label for="password">Password</label>
            </div>

            <div class="input-text">
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder=" "
                required
              />
              <label for="confirm_password">Confirm Password</label>
            </div>

            <div class="btn">
              <button type="button" onclick="handleRegister()">Register</button>
            </div>

            <div class="login-link">
              Already have an account? <a href="/pages/login.html">Login here</a>
            </div>

            <div id="message"></div>
          </form>
        </div>
      </section>
    </main>

    <!-- Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" id="modalContent">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Message</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      async function handleRegister() {
        // Get form values
        const id_number = document.getElementById("id_number").value;
        const last_name = document.getElementById("last_name").value;
        const first_name = document.getElementById("first_name").value;
        const middle_name = document.getElementById("middle_name").value;
        const course_level = document.getElementById("course_level").value;
        const course = document.getElementById("course").value;
        const address = document.getElementById("address").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirm_password = document.getElementById("confirm_password").value;

        // Validate passwords match
        if (password !== confirm_password) {
          showMessage("Passwords do not match!", "danger");
          return;
        }

        // Validate password length
        if (password.length < 6) {
          showMessage("Password must be at least 6 characters!", "danger");
          return;
        }

        // Validate required fields
        if (
          !id_number ||
          !last_name ||
          !first_name ||
          !course_level ||
          !course ||
          !email ||
          !password
        ) {
          showMessage("Please fill in all required fields.", "danger");
          return;
        }

        try {
          const response = await fetch("/api/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              id_number,
              last_name,
              first_name,
              middle_name,
              course_level: parseInt(course_level),
              course,
              address,
              email,
              password,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            showMessage(
              "Registration successful! Redirecting to login...",
              "success",
            );
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } else {
            showMessage(data.error || "Registration failed", "danger");
          }
        } catch (error) {
          showMessage("An error occurred. Please try again.", "danger");
          console.error("Registration error:", error);
        }
      }

      let messageModal = null;

      function showMessage(message, type) {
        const modalEl = document.getElementById("messageModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalBody = document.getElementById("modalBody");
        const modalContent = document.getElementById("modalContent");
        
        // Set message content
        modalTitle.textContent = type === "success" ? "Success" : "Error";
        modalBody.textContent = message;
        
        // Set color based on type
        if (type === "success") {
          modalContent.style.borderTop = "4px solid #198754"; // green
        } else {
          modalContent.style.borderTop = "4px solid #dc3545"; // red
        }
        
        // Show modal
        messageModal = new bootstrap.Modal(modalEl);
        messageModal.show();
      }
    </script>
    <script src="/js/navigation.js"></script>
  </body>
</html>
