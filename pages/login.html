<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/pages/login.css" />
    <link rel="stylesheet" href="/public/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title>Login - CCS Sit-in Monitoring System</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav">
      <div class="logo">
        <img
          src="/image/ccslogo1.png"
          class="img"
          alt="uclogo"
          height="60px"
          width="60px"
        />
        <p class="title">CCS Sit-in Monitoring System</p>
      </div>

      <div class="nav-links" id="nav-links">
        <a href="/index.html" class="nav-link">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="/pages/community.html" class="nav-link">
          <i class="fas fa-users"></i> Community
        </a>
        <a href="/pages/aboutus.html" class="nav-link">
          <i class="fas fa-info-circle"></i> About
        </a>
        <a href="/pages/login.html" class="nav-link active" id="loginLink">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="/pages/Register.html" class="nav-link" id="registerLink">
          <i class="fas fa-user-plus"></i> Register
        </a>
        <a href="/pages/dashboard.html" class="nav-link" id="dashboardLink" style="display: none;">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>
        <a href="#" class="nav-link" id="logoutLink" onclick="handleLogout()" style="display: none;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>

      <div class="nav-right" id="nav-right" style="display: none;">
        <div class="user-menu">
          <span class="welcome-user">Welcome, <span id="userName">Student</span></span>
        </div>
        <button class="logout-btn" onclick="handleLogout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>

    <main>
      <section class="login animate__animated animate__fadeInUp">
        <div class="box">
          <h1>Login</h1>
          <div class="flexme">
            <form id="loginForm">
              <div class="input-here">
                <input type="text" id="id_number" required />
                <label>ID Number</label>
              </div>

              <div class="input-here">
                <input type="password" id="password" required />
                <label>Password</label>
              </div>

              <div class="btn">
                <button type="submit">Login</button>
              </div>
            </form>
          </div>

          <p class="register-link">
            Don't have an account?
            <a href="Register.html">Register here</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/js/navigation.js"></script>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const id_number = document.getElementById('id_number').value;
        const password = document.getElementById('password').value;
        
        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ id_number, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            localStorage.setItem('session_token', data.session_token);
            window.location.href = '/dashboard.html';
          } else {
            alert(data.error || 'Login failed');
          }
        } catch (error) {
          console.error('Login error:', error);
          alert('An error occurred. Please try again.');
        }
      });
    </script>
  </body>
</html>
